body:
  text: 正文天地以生成為德有生所甚重者身也身以安樂為本安樂可致者以保養為本世之人必求其本則本必固本既固疾病何由而生夭橫何由而至此攝生之道無逮於此夫草木無知猶假灌溉矧人為萬物之靈豈不足資以保養然保養之義其理萬計約而言之其術有三一養神二惜氣三堤疾忘情去智恬澹虛無離事全真內外無寄如是則神不內耗境不外惑真一不雜則神自寧矣此養神也抱一元之本根固歸精之真氣三焦定位六賊忘形識界既空大同斯契則氣自定矣此惜氣也飲食適時溫涼合度出處無犯於八邪寤寐不可以勉強則身自安矣此堤疾也三者甚易行人自謂難行而不肯行如此雖有長生之法人罕專向遂至永謝是以疾病交攻太和頓失聖人憫之故假以保救之術輔以蠲疴之藥俾有識無識咸臻壽域哉天地既判生萬物者惟五氣爾五氣定位則五味生五味生則千變萬化不可窮已故曰生物者氣也成之者味也以奇生則成而偶以偶生則成而奇寒氣堅故其味可用以火熱氣軟故其味可用以堅風氣散故其味可用以收燥氣收故其味可用以散土者沖氣之所生則無所不和故其味可用以緩氣堅則壯故苦可以養氣脈軟則和故咸可以養脈骨收則強故酸可以養骨筋收則不攣故辛可以養筋肉緩則不壅故甘可以養肉堅之而後可以軟收之而後可以散欲緩則用甘不欲則不用用之不可太過太過則病矣古之養生治疾者必先通乎此不通乎此而能已人之疾者蓋寡矣夫安樂之道在能保養者得之況招徠和氣之藥少攻決之藥多不可不察也是知人之生須假保養無犯和氣以資生命才失將護便致病生苟或處治乖方旋至顛越防患須在閒日故曰安不忘危存不忘亡此聖人之預戒也攝養之道莫若守中則無過不及之患經曰春夏秋冬四時陰陽生病起於過用蓋不失其性而強云為強逐處即病生五臟受氣蓋有常分用之過耗是以病生善養生者即無過耗之弊又能保守真元何患乎外邪所中也故善服藥不若善保養不善保養不若善服藥世有不善保養又不善服藥倉卒病生而歸咎於神天噫是亦未嘗思也可不慎與夫未聞道者放逸其心逆於生樂以精神徇智巧以憂畏徇得失以勞苦徇禮節以身世徇財利四徇不置心為之疾矣極力勞形躁暴氣逆當風縱酒食嗜辛酸肝為之病矣飲食生冷溫涼失度久坐久臥太飽太飢脾為之病矣呼叫過常辯爭陪答冒犯寒暄恣食鹹苦肺為之病矣久坐濕地強力入水縱欲勞形三田漏溢腎為之病矣五病既作故未老而羸未羸而病病至則重重則必斃嗚呼是皆弗思而自取之也衛生之士謹此五者可致終身無苦經曰不治已病治未病正此謂也夫善養生者養內不善養生者養外養外實外以充快悅澤貪欲恣情為務殊不知外實則內虛也善養內者實內使臟腑安和三焦各守其內飲食常適其宜故莊周曰人之可畏者衽席飲食之間而不知為之戒者過也若能常如是畏謹疾病何緣而起壽命焉得不長賢者造形而悟愚者臨病不知誠可畏也哉夫柔情難綰而不斷不可不以智慧剛勇決也故幃箔不可不遠斯言至近易其事至難行蓋人之至慧淺陋剛勇粗猛不能勝其貪欲也故佛書曰諸苦所因貪欲為本若滅貪欲何所依止是知貪欲不滅苦亦不滅貪欲滅苦亦滅聖人言近而指遠不可不思不可不懼善攝生者不勞神不苦形神形既安禍何由而致也夫人之生以氣血為本人之病未有不先傷其氣血者世有童男室女積想在心思慮過當多致勞損男則神色先散女則月水先閉何以致然蓋憂愁思慮則傷心心傷則血逆竭血逆竭故神色先散而月水先閉也火既受病不能榮養其子故不嗜食脾既虛則金氣虧故發嗽嗽既作水氣絕故四肢干木氣不充故多怒鬚髮焦筋痿俟五臟傳遍故卒不能起然終死矣此一種於諸勞者最為難治蓋病起於五臟之中無有已期藥力不可及也若或自能改易心志用藥扶接如此則可得九死一生舉此為例其餘諸勞可按脈與證而治之也人生實陰陽之氣所聚若不能調和陰陽之氣則害其生故保命全形篇論曰人以天地之氣生又曰天地合氣命之曰人是以陽化氣陰成形也夫遊魂為變者陽化氣也精氣為物者陰成形也陰陽氣合神在其中矣故陰陽應象大論曰天地之動靜神明為之綱紀即知神明不可以陰陽攝也易所以言陰陽不測之謂神蓋謂此矣故曰神不可大用大用即竭形不可太勞太勞則斃是知精氣神人之大本也不可不謹惟智者養其神惜其氣以固其本世有不謹衛生之經者動皆觸犯既以犯養生之禁須假以外術保救不可坐以待斃本草之經於是興焉既知保救之理不可不窮究保救之事衍義於是存焉二者其名雖異其理僅同欲使有知無知咸臻壽域率至安樂之鄉適是意者求其意而可矣養心之道未可忽也六慾七情千變萬化出沒不定其言至簡其義無窮而以一心對無窮之事不亦勞乎心苟不明不為物所病者未之有也故明達之士遂至忘心心既忘矣則六慾七情無能為也六慾七情既無能為故內事不生內事不生故外患不能入外患不能入則本草之用實世之芻狗耳若未能達其意而至是地則未有不緣六慾七情而起憂患者憂患既作則此書一日不可闕也愚何人哉必欲以斯文絕人之憂患乎又曰貴豪之家形樂志苦者也衣食足則形樂心慮多則志苦岐伯曰病生於脈形樂則外實志苦則內虛故病生於脈所養既與貧下異憂樂思慮不同當各遂其人而治之
